<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>じこしょうかい — Self Introduction</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy-deep:  #111C35;
  --navy:       #1B2B4E;
  --navy-mid:   #22355E;
  --navy-card:  #26396A;
  --navy-light: #2E4580;
  --pink:       #CF2D5D;
  --pink-hover: #E0456F;
  --cream:      #F5F2EA;
  --cream-dark: #EAE6DB;
  --gold:       #C9A550;
  --white:      #FFFFFF;
  --muted:      rgba(255,255,255,0.5);
  --f-en:       'Montserrat', sans-serif;
  --f-jp:       'Noto Sans JP', 'Montserrat', sans-serif;
  --r-card:     18px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--f-en);
  background: #FFFFFF;
  color: var(--navy);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  padding: 13px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(27,43,78,0.1);
  flex-shrink: 0;
}
.hd-school {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--pink);
}
.hd-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.hd-jp {
  font-family: var(--f-jp);
  font-size: 14px;
  font-weight: 500;
  color: var(--navy-mid);
}
.hd-div { width:1px; height:14px; background:rgba(27,43,78,.2); }
.hd-en {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .07em;
  color: var(--navy-mid);
}

/* ── MAIN ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px 16px 24px;
  gap: 16px;
}

/* ── PROGRESS ── */
.progress-track {
  width: 100%;
  max-width: 700px;
  height: 2px;
  background: rgba(27,43,78,.1);
  border-radius: 2px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), #E8507A);
  border-radius: 2px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* ── CARD SCENE ── */
.card-scene {
  width: 100%;
  max-width: 700px;
  height: 560px;
  perspective: 1400px;
}
.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .65s cubic-bezier(.4,.2,.2,1);
}
.card.is-flipped { transform: rotateY(180deg); }

/* ── FACES ── */
.card-face {
  position: absolute;
  inset: 0;
  border-radius: var(--r-card);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* FRONT */
.card-front {
  background: #FFFFFF;
  border: 1px solid rgba(27,43,78,.12);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  cursor: pointer;
  user-select: none;
}
.q-tag {
  position: absolute;
  top: 20px;
  left: 26px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--pink);
}
.tts-front-wrap {
  position: absolute;
  top: 14px;
  right: 20px;
}
.question-html {
  font-family: var(--f-jp);
  font-size: clamp(28px, 5.5vw, 46px);
  font-weight: 700;
  line-height: 2.4;
  text-align: center;
  padding: 0 40px;
  color: var(--navy-deep);
}
.question-html ruby rt {
  font-size: .30em;
  font-weight: 400;
  color: var(--pink);
  letter-spacing: .03em;
}
.reveal-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 26px;
  background: var(--pink);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: var(--f-en);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s, transform .18s;
}
.reveal-btn:hover { background: var(--pink-hover); transform: translateY(-2px); }
.flip-hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: .1em;
  color: rgba(27,43,78,.38);
  white-space: nowrap;
}

/* BACK */
.card-back {
  background: #FFFFFF;
  color: var(--navy);
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
}
.back-header {
  background: var(--navy);
  padding: 13px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
}
.back-header-text { flex: 1; min-width: 0; }
.back-header-lbl {
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 3px;
}
.back-header-q {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.back-flip-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.14);
  color: rgba(255,255,255,.8);
  border-radius: 50px;
  padding: 5px 14px;
  font-family: var(--f-en);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .2s;
}
.back-flip-btn:hover { background: rgba(255,255,255,.16); }

.back-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px 22px;
  scroll-behavior: smooth;
}
.back-scroll::-webkit-scrollbar { width: 4px; }
.back-scroll::-webkit-scrollbar-track { background: #f0f0f0; }
.back-scroll::-webkit-scrollbar-thumb { background: rgba(27,43,78,.25); border-radius: 2px; }

/* ── BACK CONTENT ── */
.back-sec { margin-bottom: 16px; }
.back-sec:last-child { margin-bottom: 0; }

.sec-label {
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--navy-light);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(27,43,78,.12);
}

/* Frames */
.frame-pill {
  background: var(--navy);
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 6px;
}
.frame-pill:last-child { margin-bottom: 0; }
.frame-text {
  font-family: var(--f-jp);
  font-size: 19px;
  font-weight: 500;
  line-height: 2.2;
  color: var(--white);
}
.frame-text ruby rt {
  font-size: .38em;
  color: var(--pink);
}

/* Examples */
.example-block {
  background: var(--cream);
  border-radius: 10px;
  border-left: 3px solid var(--pink);
  padding: 10px 14px 8px;
  margin-bottom: 7px;
}
.example-block:last-child { margin-bottom: 0; }
.ex-jp {
  font-family: var(--f-jp);
  font-size: 18px;
  font-weight: 600;
  line-height: 2.2;
  color: var(--navy);
}
.ex-jp ruby rt {
  font-size: .38em;
  color: var(--pink);
}
.ex-en {
  font-size: 11.5px;
  color: #777;
  font-style: italic;
  margin-top: 1px;
}
.ex-tts-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 5px;
}

/* TTS Button (shared) */
.tts-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--pink);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 6px 13px;
  font-family: var(--f-en);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .18s, transform .15s;
}
.tts-btn:hover { background: var(--pink-hover); transform: translateY(-1px); }
.tts-btn svg { width:11px; height:11px; fill:currentColor; flex-shrink:0; }

/* Vocab table */
.vocab-block { margin-bottom: 10px; }
.vocab-block:last-child { margin-bottom: 0; }
.vocab-title {
  background: var(--navy-light);
  color: white;
  padding: 5px 13px;
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  border-radius: 8px 8px 0 0;
}
.vocab-wrap {
  border-radius: 0 0 8px 8px;
  overflow: hidden;
  border: 1px solid rgba(27,43,78,.1);
  border-top: none;
}
.vocab-table {
  width: 100%;
  border-collapse: collapse;
}
.vocab-table thead tr { background: var(--navy); }
.vocab-table th {
  padding: 6px 11px;
  font-size: 7.5px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.65);
  text-align: left;
}
.vocab-table td {
  padding: 5px 11px;
  border-bottom: 1px solid rgba(27,43,78,.07);
  vertical-align: middle;
}
.vocab-table tr:last-child td { border-bottom: none; }
.vocab-table tr:nth-child(odd) td  { background: #f7f5f0; }
.vocab-table tr:nth-child(even) td { background: white; }
.td-jp {
  font-family: var(--f-jp);
  font-size: 14.5px;
  font-weight: 500;
  color: var(--navy);
}
.td-rm { font-size: 11px; color: #666; font-style: italic; }
.td-en { font-size: 11.5px; color: #444; }

/* ── NAV ── */
.nav-area {
  display: flex;
  align-items: center;
  gap: 18px;
}
.nav-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(27,43,78,.18);
  background: rgba(27,43,78,.04);
  color: var(--navy);
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .18s, border-color .18s, color .18s;
}
.nav-btn:hover:not(:disabled) {
  background: var(--pink);
  border-color: var(--pink);
  color: white;
}
.nav-btn:disabled { opacity: .22; cursor: not-allowed; }
.nav-counter {
  font-size: 12px;
  font-weight: 700;
  color: rgba(27,43,78,.45);
  letter-spacing: .1em;
  min-width: 46px;
  text-align: center;
}

/* ── ORDER BUTTONS ── */
.order-area {
  display: flex;
  align-items: center;
  gap: 8px;
}
.order-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 36px;
  padding: 0 16px;
  border-radius: 18px;
  border: 1px solid rgba(27,43,78,.18);
  background: rgba(27,43,78,.04);
  color: var(--navy);
  font-family: var(--f-en);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  cursor: pointer;
  transition: background .18s, border-color .18s, color .18s, transform .15s;
}
.order-btn:hover:not(.is-active) {
  background: var(--navy);
  border-color: var(--navy);
  color: white;
  transform: translateY(-1px);
}
.order-btn.is-active {
  background: var(--pink);
  border-color: var(--pink);
  color: white;
}
.btn-jp {
  font-family: var(--f-jp);
  font-weight: 400;
  font-size: 10px;
  opacity: .6;
  letter-spacing: .02em;
}
</style>
</head>

<header>
  <div class="hd-school">St Aidan's Anglican Girls' School</div>
  <div class="hd-right">
    <span class="hd-jp">じこしょうかい</span>
    <div class="hd-div"></div>
    <span class="hd-en">Self Introduction</span>
  </div>
</header>

<main>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="card-scene">
    <div class="card" id="theCard">

      <!-- FRONT -->
      <div class="card-face card-front" id="cardFront" onclick="flipCard()">
        <span class="q-tag" id="qTag">Q 1 / 8</span>
        <div class="tts-front-wrap">
          <button class="tts-btn" id="ttsFront" onclick="event.stopPropagation(); speakCurrent()">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            Listen &nbsp;<span style="opacity:.65;font-weight:400">きく</span>
          </button>
        </div>
        <div class="question-html" id="questionHtml"></div>
        <button class="reveal-btn" onclick="event.stopPropagation(); flipCard()">
          Reveal answer &nbsp;<span style="opacity:.65;font-weight:400">こたえをみる</span> &#8594;
        </button>
        <div class="flip-hint">Click anywhere on the card to flip &nbsp;·&nbsp; カードをクリックしてフリップ</div>
      </div>

      <!-- BACK -->
      <div class="card-face card-back" id="cardBack">
        <div class="back-header">
          <div class="back-header-text">
            <div class="back-header-lbl">English meaning &nbsp;·&nbsp; いみ</div>
            <div class="back-header-q" id="backEnQ"></div>
          </div>
          <button class="back-flip-btn" onclick="flipBack()">&#8592; Back &nbsp;<span style="opacity:.65;font-weight:400">もどる</span></button>
        </div>
        <div class="back-scroll" id="backScroll"></div>
      </div>

    </div>
  </div>

  <nav class="nav-area">
    <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">&#8592;</button>
    <span class="nav-counter" id="navCounter">1 / 8</span>
    <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">&#8594;</button>
  </nav>
  <div class="order-area">
    <button class="order-btn" id="shuffleBtn" onclick="shuffleOrder()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      Shuffle &nbsp;<span class="btn-jp">シャッフル</span>
    </button>
    <button class="order-btn order-btn--reset" id="resetBtn" onclick="resetOrder()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      Original order &nbsp;<span class="btn-jp">もとにもどす</span>
    </button>
  </div>
</main>

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let deck         = slides.map((_, i) => i);  // indices into slides[]
let currentIndex = 0;
let isFlipped    = false;
let isShuffled   = false;

/* ─────────────────────────────────────────────
   ELEMENTS
───────────────────────────────────────────── */
const theCard      = document.getElementById('theCard');
const progressFill = document.getElementById('progressFill');
const qTag         = document.getElementById('qTag');
const questionHtml = document.getElementById('questionHtml');
const backEnQ      = document.getElementById('backEnQ');
const backScroll   = document.getElementById('backScroll');
const navCounter   = document.getElementById('navCounter');
const prevBtn      = document.getElementById('prevBtn');
const nextBtn      = document.getElementById('nextBtn');

/* ─────────────────────────────────────────────
   TTS
───────────────────────────────────────────── */
const SVG_SPEAKER = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg> Listen <span style="opacity:.65;font-weight:400">きく</span>`;

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'ja-JP';
  utt.rate  = 0.88;
  window.speechSynthesis.speak(utt);
}

function speakCurrent() {
  speak(slides[currentIndex].questionText);
}

function speakBtn(btn) {
  speak(btn.dataset.text);
}

/* ─────────────────────────────────────────────
   FLIP
───────────────────────────────────────────── */
function flipCard() {
  if (!isFlipped) {
    isFlipped = true;
    theCard.classList.add('is-flipped');
  }
}

function flipBack() {
  isFlipped = false;
  theCard.classList.remove('is-flipped');
}

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
function escText(t) {
  return t.replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function buildVocabBlock(section) {
  let h = `<div class="vocab-block">`;
  if (section.title) {
    h += `<div class="vocab-title">${section.title}</div>`;
  }
  h += `<div class="vocab-wrap"><table class="vocab-table">
    <thead><tr>
      <th>にほんご</th>
      <th>ローマ字</th>
      <th>English</th>
    </tr></thead><tbody>`;
  for (const r of section.rows) {
    h += `<tr>
      <td class="td-jp">${r[0]}</td>
      <td class="td-rm">${r[1]}</td>
      <td class="td-en">${r[2]}</td>
    </tr>`;
  }
  h += `</tbody></table></div></div>`;
  return h;
}

function renderSlide(index) {
  const s = slides[deck[index]];

  // reset flip
  isFlipped = false;
  theCard.classList.remove('is-flipped');

  // progress bar
  progressFill.style.width = `${((index + 1) / deck.length) * 100}%`;

  // front
  qTag.textContent       = `Q ${index + 1} / ${deck.length}`;
  questionHtml.innerHTML = s.questionHTML;

  // back header
  backEnQ.textContent = s.englishQ;

  // nav
  navCounter.textContent = `${index + 1} / ${deck.length}`;
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === deck.length - 1;

  // ── Build back scroll content ──
  let html = '';

  // Sentence Frames
  html += `<div class="back-sec">
    <div class="sec-label">Sentence frames &nbsp;·&nbsp; ぶんけい</div>`;
  for (const f of s.frames) {
    html += `<div class="frame-pill"><div class="frame-text">${f.html}</div></div>`;
  }
  html += `</div>`;

  // Example Answers
  const exLabel = s.examples.length > 1
    ? 'Example answers &nbsp;·&nbsp; れいぶん'
    : 'Example answer &nbsp;·&nbsp; れいぶん';
  html += `<div class="back-sec">
    <div class="sec-label">${exLabel}</div>`;
  for (const ex of s.examples) {
    const safeText = escText(ex.text);
    html += `<div class="example-block">
      <div class="ex-jp">${ex.html}</div>
      <div class="ex-en">${ex.en}</div>
      <div class="ex-tts-row">
        <button class="tts-btn" data-text="${safeText}" onclick="speakBtn(this)">
          ${SVG_SPEAKER}
        </button>
      </div>
    </div>`;
  }
  html += `</div>`;

  // Vocab
  if (s.vocab) {
    html += `<div class="back-sec">
      <div class="sec-label">Vocabulary &nbsp;·&nbsp; ごい</div>`;
    for (const section of s.vocab) {
      html += buildVocabBlock(section);
    }
    html += `</div>`;
  }

  backScroll.innerHTML = html;
  backScroll.scrollTop = 0;
}

function changeSlide(dir) {
  const newIndex = currentIndex + dir;
  if (newIndex >= 0 && newIndex < deck.length) {
    currentIndex = newIndex;
    renderSlide(currentIndex);
  }
}

function shuffleOrder() {
  // Fisher-Yates shuffle
  const arr = slides.map((_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  deck = arr;
  currentIndex = 0;
  isShuffled = true;
  document.getElementById('shuffleBtn').classList.add('is-active');
  document.getElementById('resetBtn').classList.remove('is-active');
  renderSlide(0);
}

function resetOrder() {
  deck = slides.map((_, i) => i);
  currentIndex = 0;
  isShuffled = false;
  document.getElementById('resetBtn').classList.add('is-active');
  document.getElementById('shuffleBtn').classList.remove('is-active');
  renderSlide(0);
  // remove active state after a moment
  setTimeout(() => document.getElementById('resetBtn').classList.remove('is-active'), 800);
}

/* ── Keyboard navigation ── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changeSlide(-1);
  if (e.key === ' ') { e.preventDefault(); isFlipped ? flipBack() : flipCard(); }
});

/* ── Init ── */
renderSlide(0);
</script>
